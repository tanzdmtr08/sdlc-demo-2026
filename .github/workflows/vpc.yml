name: VPC Deploy

# If someone pushes to main branch, then continue executing.
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.5

      # Runs a single commaind using the runners shell.
      - name: Init
        working-directory: vpc
        run: |
          terraform init


      # Runs a single commaind using the runners shell.
      - name: Init
        working-directory: vpc
        run: |
          terraform plan


      # Runs a single commaind using the runners shell.
      - name: Init
        working-directory: vpc
        run: |
          terraform apply

